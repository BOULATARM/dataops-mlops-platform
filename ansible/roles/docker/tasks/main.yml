---
# Cree le dossier qui stocke la cle GPG officielle de Docker.
- name: Create Docker apt keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# Telecharge la cle GPG Docker pour verifier les paquets installes.
- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

# Ajoute le depot officiel Docker pour Ubuntu 22.04.
- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu jammy stable"
    filename: docker
    state: present

# Installe Docker Engine et le plugin Docker Compose moderne.
- name: Install Docker CE and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

# Ajoute l'utilisateur ubuntu au groupe docker pour lancer docker sans sudo apres reconnexion.
- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

# Active Docker au demarrage et le lance immediatement.
- name: Enable and start Docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
