[tool.dagster]
module_name = "dagster_project.definitions"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-q"

[tool.ruff]
line-length = 120
target-version = "py311"
exclude = [".dagster", "warehouse", "__pycache__"]
